<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

  <title>Найди пару</title>
  <link rel="stylesheet" href="./css/normalize.css">
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <div class="game-container">
    <section class="game-screen">
      <div class="timer-wrapper">
        <div class="timer"></div>
        <div class="time-plus">+3</div>
      </div>

      <h2 class="pair-counter">Найдите пару</h2>

      <div class="button-area">
        <button id="b1" class="emoji-button" type="button"></button>
        <button id="b2" class="emoji-button" type="button"></button>
        <button id="b3" class="emoji-button" type="button"></button>
        <button id="b4" class="emoji-button" type="button"></button>
        <button id="b5" class="emoji-button" type="button"></button>
        <button id="b6" class="emoji-button" type="button"></button>
        <button id="b7" class="emoji-button" type="button"></button>
        <button id="b8" class="emoji-button" type="button"></button>
        <button id="b9" class="emoji-button" type="button"></button>
        <button id="b10" class="emoji-button" type="button"></button>
        <button id="b11" class="emoji-button" type="button"></button>
        <button id="b12" class="emoji-button" type="button"></button>
        <button id="b13" class="emoji-button" type="button"></button>
        <button id="b14" class="emoji-button" type="button"></button>
        <button id="b15" class="emoji-button" type="button"></button>
        <button id="b16" class="emoji-button" type="button"></button>
      </div>

      <button class="hint-button" type="button">Подсказка</button>
    </section>

    <section class="game-over-screen">
      <h2 class="pair-counter">Результат</h2>

      <button class="replay-button" type="button">Попробовать снова</button>
    </section>
  </div>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
